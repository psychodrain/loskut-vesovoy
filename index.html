<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@psychodrain</title>
    <!-- Подключаем Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Подключаем CSS для YTPlayer -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery.mb.YTPlayer/3.3.9/css/jquery.mb.YTPlayer.min.css">
    <style>
        /* Стили для страницы */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000;
        }

        /* Затемнение поверх видео */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
            pointer-events: none;
        }

        /* КОНТРОЛЛЕР ГРОМКОСТИ В ЛЕВОМ ВЕРХНЕМ УГЛУ - УМЕНЬШЕННЫЙ И В РЯД */
        .volume-controller {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 3;
            display: flex;
            flex-direction: row;  /* В РЯД */
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            
            /* Белое неоновое свечение */
            box-shadow: 
                0 0 15px rgba(255, 255, 255, 0.4),
                0 0 30px rgba(255, 255, 255, 0.2),
                inset 0 0 8px rgba(255, 255, 255, 0.3);
        }

        /* КНОПКА ЗВУКА - УМЕНЬШЕННАЯ */
        .sound-button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: white;
            border: none;
            color: #222;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            
            /* Белое неоновое свечение */
            box-shadow: 0 0 15px white, 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .sound-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px white, 0 0 50px rgba(255, 255, 255, 0.8);
        }

        /* ПОЛЗУНОК ГРОМКОСТИ - УМЕНЬШЕННЫЙ */
        .volume-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid white;
            
            /* Белое свечение */
            box-shadow: 0 0 15px white;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 25px white;
        }

        /* ПРОЦЕНТЫ ГРОМКОСТИ */
        .volume-percent {
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            min-width: 35px;
            text-align: center;
            text-shadow: 0 0 8px white;
        }

        /* ПАНЕЛЬКА - БЕЛАЯ НЕОНОВАЯ */
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 30px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            margin: 20px;
            position: relative;
            z-index: 2;
            
            /* БЕЛОЕ НЕОНОВОЕ СВЕЧЕНИЕ */
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.6),
                0 0 60px rgba(255, 255, 255, 0.4),
                0 0 90px rgba(255, 255, 255, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.5);
            
            /* Анимация пульсации */
            animation: whiteNeonPulse 3s ease-in-out infinite;
        }

        @keyframes whiteNeonPulse {
            0%, 100% {
                box-shadow: 
                    0 0 30px rgba(255, 255, 255, 0.6),
                    0 0 60px rgba(255, 255, 255, 0.4),
                    0 0 90px rgba(255, 255, 255, 0.2),
                    inset 0 0 20px rgba(255, 255, 255, 0.5);
            }
            50% {
                box-shadow: 
                    0 0 50px rgba(255, 255, 255, 0.9),
                    0 0 100px rgba(255, 255, 255, 0.7),
                    0 0 150px rgba(255, 255, 255, 0.5),
                    inset 0 0 30px rgba(255, 255, 255, 0.8);
            }
        }

        h1 {
            color: #222;
            margin-bottom: 0.3rem;
            font-size: 2rem;
            text-shadow: 0 0 8px white;
        }

        p {
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            text-shadow: 0 0 4px white;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.8rem;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .social-link:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 30px white;
            filter: brightness(1.2);
            border-color: white;
        }

        .social-link i {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 5px white);
        }

        /* Индивидуальные цвета соцсетей */
        .telegram { background: #0088cc; }
        .youtube { background: #FF0000; }
        .tiktok { background: #000000; }
        .vkontakte { background: #4C75A3; }
        .soundcloud { background: #FF7700; }
    </style>
</head>
<body>
    <!-- YouTube фон со звуком -->
    <div class="ytplayer" data-property="{
        videoURL: 'https://www.youtube.com/watch?v=WPxd8Ng9-x0',
        containment: 'body',
        autoPlay: true,
        mute: false,
        startAt: 0,
        opacity: 1,
        loop: true,
        showControls: false,
        showYTLogo: false,
        addRaster: false,
        quality: 'hd1080',
        optimizeDisplay: true,
        stopMovieOnBlur: false,
        realfullscreen: true,
        volume: 50
    }"></div>

    <!-- Затемняющий слой -->
    <div class="overlay"></div>

    <!-- КОНТРОЛЛЕР ГРОМКОСТИ - В РЯД И УМЕНЬШЕННЫЙ -->
    <div class="volume-controller">
        <!-- КНОПКА ЗВУКА -->
        <button class="sound-button" id="soundToggle">
            <i class="fas fa-volume-high" id="soundIcon"></i>
        </button>
        
        <!-- ПОЛЗУНОК ГРОМКОСТИ -->
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50">
        
        <!-- ПРОЦЕНТЫ -->
        <span class="volume-percent" id="volumePercent">50%</span>
    </div>

    <!-- ПАНЕЛЬКА -->
    <div class="container">
        <h1>Связь</h1>
        <p>👋</p>

        <div class="social-links">
            <a href="https://t.me/psychodrain" target="_blank" class="social-link telegram">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
            
            <a href="https://www.youtube.com/@mishanya_atarax" target="_blank" class="social-link youtube">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            
            <a href="https://tiktok.com/@kaceiiii" target="_blank" class="social-link tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            
            <a href="https://vk.com/gang_tyumen" target="_blank" class="social-link vkontakte">
                <i class="fab fa-vk"></i> ВКонтакте
            </a>
            
            <a href="https://soundcloud.com/mishanyalirikov" target="_blank" class="social-link soundcloud">
                <i class="fab fa-soundcloud"></i> SoundCloud
            </a>
        </div>
    </div>

    <!-- Подключаем jQuery и YTPlayer -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mb.YTPlayer/3.3.9/jquery.mb.YTPlayer.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Активируем YouTube плеер
            $(".ytplayer").YTPlayer();
            
            let player = null;
            let lastVolume = 50;
            
            // Ждем загрузки плеера
            function waitForPlayer() {
                const ytPlayer = $(".ytplayer").data("ytPlayer");
                if (ytPlayer && ytPlayer.player) {
                    player = ytPlayer.player;
                    console.log("Player loaded!");
                    initControls();
                } else {
                    console.log("Waiting for player...");
                    setTimeout(waitForPlayer, 500);
                }
            }
            
            waitForPlayer();
            
            function initControls() {
                const soundToggle = document.getElementById('soundToggle');
                const soundIcon = document.getElementById('soundIcon');
                const volumeSlider = document.getElementById('volumeSlider');
                const volumePercent = document.getElementById('volumePercent');
                
                if (!player || !player.setVolume) {
                    console.error("Player not ready");
                    return;
                }
                
                // Устанавливаем начальную громкость
                player.setVolume(50);
                console.log("Volume set to 50");
                
                // Функция обновления иконки
                function updateIcon(volume) {
                    if (volume == 0) {
                        soundIcon.className = 'fas fa-volume-mute';
                    } else if (volume < 30) {
                        soundIcon.className = 'fas fa-volume-low';
                    } else {
                        soundIcon.className = 'fas fa-volume-high';
                    }
                }
                
                // Ползунок громкости - ТЕПЕРЬ РАБОТАЕТ!
                volumeSlider.addEventListener('input', function(e) {
                    const volume = parseInt(e.target.value);
                    volumePercent.textContent = volume + '%';
                    
                    if (player && player.setVolume) {
                        player.setVolume(volume);
                        console.log("Volume changed to:", volume);
                    }
                    
                    updateIcon(volume);
                    
                    if (volume > 0) {
                        lastVolume = volume;
                    }
                });
                
                // Кнопка mute
                soundToggle.addEventListener('click', function() {
                    if (!player || !player.getVolume) return;
                    
                    const currentVolume = player.getVolume();
                    console.log("Current volume:", currentVolume);
                    
                    if (currentVolume > 0) {
                        // Выключаем звук
                        lastVolume = currentVolume;
                        player.setVolume(0);
                        volumeSlider.value = 0;
                        volumePercent.textContent = '0%';
                        updateIcon(0);
                        console.log("Muted");
                    } else {
                        // Включаем звук
                        player.setVolume(lastVolume);
                        volumeSlider.value = lastVolume;
                        volumePercent.textContent = lastVolume + '%';
                        updateIcon(lastVolume);
                        console.log("Unmuted to:", lastVolume);
                    }
                });
                
                // Синхронизация
                setInterval(() => {
                    if (player && player.getVolume) {
                        const vol = player.getVolume();
                        if (vol !== parseInt(volumeSlider.value)) {
                            volumeSlider.value = vol;
                            volumePercent.textContent = vol + '%';
                            updateIcon(vol);
                        }
                    }
                }, 200);
            }
        });
    </script>
</body>
</html>
