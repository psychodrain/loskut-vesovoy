<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@psychodrain</title>
    <!-- Подключаем Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000;
        }

        /* YouTube плеер на весь экран */
        #youtube-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #youtube-player iframe {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Затемнение */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
            pointer-events: none;
        }

        /* КНОПКА ЗВУКА */
        .sound-button {
            position: fixed;
            top: 25px;
            left: 25px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(15, 15, 20, 0.95);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            
            /* НЕОН */
            box-shadow: 
                0 0 25px rgba(255, 255, 255, 0.8),
                0 0 50px rgba(255, 255, 255, 0.4),
                inset 0 0 12px rgba(255, 255, 255, 0.6);
        }

        .sound-button:hover {
            transform: scale(1.1);
            background: rgba(30, 30, 40, 0.98);
            box-shadow: 
                0 0 35px rgba(255, 255, 255, 1),
                0 0 70px rgba(255, 255, 255, 0.7);
        }

        /* ПАНЕЛЬКА */
        .container {
            background: rgba(8, 8, 12, 0.9);
            backdrop-filter: blur(15px);
            padding: 2.5rem 2.2rem;
            border-radius: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            margin: 20px;
            position: relative;
            z-index: 2;
            
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            box-shadow: 
                0 0 45px rgba(255, 255, 255, 0.4),
                0 0 90px rgba(255, 255, 255, 0.2),
                inset 0 0 30px rgba(255, 255, 255, 0.15);
            
            animation: neonBreathing 3.5s ease-in-out infinite;
        }

        @keyframes neonBreathing {
            0%, 100% {
                box-shadow: 
                    0 0 45px rgba(255, 255, 255, 0.4),
                    0 0 90px rgba(255, 255, 255, 0.2),
                    inset 0 0 30px rgba(255, 255, 255, 0.15);
            }
            50% {
                box-shadow: 
                    0 0 70px rgba(255, 255, 255, 0.7),
                    0 0 140px rgba(255, 255, 255, 0.4),
                    inset 0 0 45px rgba(255, 255, 255, 0.25);
            }
        }

        h1 {
            color: white;
            margin-bottom: 2.2rem;
            font-size: 2.4rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            letter-spacing: 2px;
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 1rem;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 1.3rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 1.1rem 1.3rem;
            border-radius: 60px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.7);
            
            box-shadow: 
                0 0 20px rgba(255, 255, 255, 0.2),
                0 0 40px rgba(255, 255, 255, 0.1);
        }

        .social-link:hover {
            transform: translateY(-5px) scale(1.04);
            box-shadow: 
                0 0 40px rgba(255, 255, 255, 0.7),
                0 0 80px rgba(255, 255, 255, 0.4);
            filter: brightness(1.4);
            border-color: rgba(255, 255, 255, 0.7);
        }

        .social-link i {
            font-size: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.6));
        }

        .telegram { background: linear-gradient(145deg, #0088cc, #006699); }
        .youtube { background: linear-gradient(145deg, #FF0000, #CC0000); }
        .tiktok { background: linear-gradient(145deg, #000000, #1a1a1a); }
        .vkontakte { background: linear-gradient(145deg, #4C75A3, #3a5a7a); }
        .soundcloud { background: linear-gradient(145deg, #FF7700, #CC5500); }
    </style>
</head>
<body>
    <!-- YouTube плеер -->
    <div id="youtube-player"></div>

    <!-- Затемнение -->
    <div class="overlay"></div>

    <!-- КНОПКА ЗВУКА -->
    <button class="sound-button" id="soundToggle">
        <i class="fas fa-volume-mute" id="soundIcon"></i>
    </button>

    <!-- ПАНЕЛЬКА -->
    <div class="container">
        <h1>@psychodrain</h1>

        <div class="social-links">
            <a href="https://t.me/psychodrain" target="_blank" class="social-link telegram">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
            <a href="https://www.youtube.com/@mishanya_atarax" target="_blank" class="social-link youtube">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://tiktok.com/@kaceiiii" target="_blank" class="social-link tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="https://vk.com/gang_tyumen" target="_blank" class="social-link vkontakte">
                <i class="fab fa-vk"></i> ВКонтакте
            </a>
            <a href="https://soundcloud.com/mishanyalirikov" target="_blank" class="social-link soundcloud">
                <i class="fab fa-soundcloud"></i> SoundCloud
            </a>
        </div>
    </div>

    <!-- YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <script>
        // Глобальные переменные
        let player;
        let isMuted = true;
        let soundButton = document.getElementById('soundToggle');
        let soundIcon = document.getElementById('soundIcon');
        
        // Функция вызывается YouTube API когда готов
        function onYouTubeIframeAPIReady() {
            console.log('🎬 YouTube API готов');
            
            player = new YT.Player('youtube-player', {
                videoId: 'WPxd8Ng9-x0',
                playerVars: {
                    autoplay: 1,
                    loop: 1,
                    playlist: 'WPxd8Ng9-x0',
                    controls: 0,
                    showinfo: 0,
                    rel: 0,
                    iv_load_policy: 3,
                    modestbranding: 1,
                    fs: 0,
                    disablekb: 1,
                    enablejsapi: 1,
                    mute: 1  // Начинаем с mute
                },
                events: {
                    'onReady': onPlayerReady,
                    'onError': onPlayerError
                }
            });
            
            console.log('🎥 Создаем плеер...');
        }
        
        function onPlayerReady(event) {
            console.log('✅ Плеер готов и работает!');
            
            // Пробуем запустить видео
            try {
                player.playVideo();
                player.setVolume(50);
                console.log('🔊 Громкость установлена на 50%');
            } catch (e) {
                console.log('⚠️ Ошибка при настройке:', e);
            }
            
            // Ставим иконку mute
            soundIcon.className = 'fas fa-volume-mute';
        }
        
        function onPlayerError(event) {
            console.log('❌ Ошибка плеера:', event.data);
        }
        
        // Обработка нажатия на кнопку
        soundButton.addEventListener('click', function() {
            console.log('👆 Кнопка нажата!');
            
            if (!player) {
                console.log('⚠️ Плеер еще не готов');
                return;
            }
            
            try {
                if (isMuted) {
                    // Включаем звук
                    player.unMute();
                    player.setVolume(50);
                    soundIcon.className = 'fas fa-volume-high';
                    console.log('🔊 Звук ВКЛЮЧЕН');
                    isMuted = false;
                } else {
                    // Выключаем звук
                    player.mute();
                    soundIcon.className = 'fas fa-volume-mute';
                    console.log('🔇 Звук ВЫКЛЮЧЕН');
                    isMuted = true;
                }
            } catch (e) {
                console.log('❌ Ошибка при переключении звука:', e);
            }
        });
        
        // Проверяем состояние каждую секунду
        setInterval(() => {
            if (player && player.getPlayerState) {
                const state = player.getPlayerState();
                const isMutedAPI = player.isMuted();
                
                // Синхронизируем иконку с реальным состоянием
                if (isMutedAPI !== isMuted) {
                    isMuted = isMutedAPI;
                    soundIcon.className = isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-high';
                }
                
                // Если видео не играет, пробуем запустить
                if (state !== 1) {  // 1 = воспроизведение
                    try {
                        player.playVideo();
                    } catch (e) {}
                }
            }
        }, 1000);
        
        console.log('📱 Скрипт загружен');
    </script>
</body>
</html>
