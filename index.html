<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@psychodrain</title>
    <!-- Подключаем Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000;
        }

        /* YouTube iframe на весь экран */
        #youtube-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #youtube-background iframe {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Затемнение */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
            pointer-events: none;
        }

        /* КОНТРОЛЛЕР ГРОМКОСТИ */
        .volume-controller {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 3;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        .sound-button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: white;
            border: none;
            color: #222;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px white;
        }

        .sound-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px white;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px white;
        }

        .volume-percent {
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            min-width: 35px;
            text-align: center;
            text-shadow: 0 0 8px white;
        }

        /* ПАНЕЛЬКА */
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 30px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            margin: 20px;
            position: relative;
            z-index: 2;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 255, 255, 0.6); }
            50% { box-shadow: 0 0 60px rgba(255, 255, 255, 0.9); }
        }

        h1 {
            color: #222;
            margin-bottom: 0.3rem;
            font-size: 2rem;
            text-shadow: 0 0 8px white;
        }

        p {
            color: #333;
            margin-bottom: 1.5rem;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.8rem;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .social-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px white;
        }

        .telegram { background: #0088cc; }
        .youtube { background: #FF0000; }
        .tiktok { background: #000000; }
        .vkontakte { background: #4C75A3; }
        .soundcloud { background: #FF7700; }
    </style>
</head>
<body>
    <!-- YouTube фон через iframe -->
    <div id="youtube-background">
        <iframe 
            id="youtube-player"
            src="https://www.youtube.com/embed/WPxd8Ng9-x0?autoplay=1&mute=0&loop=1&playlist=WPxd8Ng9-x0&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&enablejsapi=1"
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    </div>

    <!-- Затемнение -->
    <div class="overlay"></div>

    <!-- КОНТРОЛЛЕР ГРОМКОСТИ -->
    <div class="volume-controller">
        <button class="sound-button" id="soundToggle">
            <i class="fas fa-volume-high" id="soundIcon"></i>
        </button>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50">
        <span class="volume-percent" id="volumePercent">50%</span>
    </div>

    <!-- ПАНЕЛЬКА -->
    <div class="container">
        <h1>Связь</h1>
        <p>👋</p>

        <div class="social-links">
            <a href="https://t.me/psychodrain" target="_blank" class="social-link telegram">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
            <a href="https://www.youtube.com/@mishanya_atarax" target="_blank" class="social-link youtube">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://tiktok.com/@kaceiiii" target="_blank" class="social-link tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="https://vk.com/gang_tyumen" target="_blank" class="social-link vkontakte">
                <i class="fab fa-vk"></i> ВКонтакте
            </a>
            <a href="https://soundcloud.com/mishanyalirikov" target="_blank" class="social-link soundcloud">
                <i class="fab fa-soundcloud"></i> SoundCloud
            </a>
        </div>
    </div>

    <!-- YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let lastVolume = 50;

        // Функция вызывается YouTube API когда готов
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            console.log('Player ready!');
            
            // Устанавливаем начальную громкость
            player.setVolume(50);
            
            // Элементы управления
            const soundToggle = document.getElementById('soundToggle');
            const soundIcon = document.getElementById('soundIcon');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumePercent = document.getElementById('volumePercent');
            
            // Функция обновления иконки
            function updateIcon(volume) {
                if (volume == 0) {
                    soundIcon.className = 'fas fa-volume-mute';
                } else if (volume < 30) {
                    soundIcon.className = 'fas fa-volume-low';
                } else {
                    soundIcon.className = 'fas fa-volume-high';
                }
            }
            
            // Ползунок громкости
            volumeSlider.addEventListener('input', function(e) {
                const volume = parseInt(e.target.value);
                volumePercent.textContent = volume + '%';
                
                if (player && player.setVolume) {
                    player.setVolume(volume);
                    console.log('Volume set to:', volume);
                }
                
                updateIcon(volume);
                
                if (volume > 0) {
                    lastVolume = volume;
                }
            });
            
            // Кнопка mute
            soundToggle.addEventListener('click', function() {
                if (!player) return;
                
                const currentVolume = player.getVolume();
                console.log('Current volume:', currentVolume);
                
                if (currentVolume > 0) {
                    // Выключаем звук
                    lastVolume = currentVolume;
                    player.setVolume(0);
                    volumeSlider.value = 0;
                    volumePercent.textContent = '0%';
                    updateIcon(0);
                    console.log('Muted');
                } else {
                    // Включаем звук
                    player.setVolume(lastVolume);
                    volumeSlider.value = lastVolume;
                    volumePercent.textContent = lastVolume + '%';
                    updateIcon(lastVolume);
                    console.log('Unmuted to:', lastVolume);
                }
            });
            
            // Проверяем работу каждые 100мс
            setInterval(() => {
                if (player && player.getVolume) {
                    const vol = player.getVolume();
                    if (vol !== parseInt(volumeSlider.value)) {
                        volumeSlider.value = vol;
                        volumePercent.textContent = vol + '%';
                        updateIcon(vol);
                    }
                }
            }, 100);
        }
    </script>
</body>
</html>
